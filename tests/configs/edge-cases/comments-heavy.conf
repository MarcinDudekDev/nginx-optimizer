# Edge Case: Heavily Commented Configuration
# The optimizer should handle configs with many comments

# Main server block for example.com
# This handles all traffic for the primary domain
server {
    # Listen on port 80 for HTTP traffic
    # We will redirect to HTTPS later
    listen 80;

    # Server name configuration
    # Handles both www and non-www versions
    server_name example.com www.example.com;

    # Document root
    # /var/www/html is the default location
    root /var/www/html;

    # Index files to serve
    # Try PHP first, then HTML
    index index.php index.html;

    # Main location block
    # Handles all requests
    location / {
        # Try to serve file directly
        # Fall back to index.php for WordPress
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP handling
    # Pass to PHP-FPM socket
    location ~ \.php$ {
        # Include FastCGI params
        include fastcgi_params;
        # Pass to PHP-FPM
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        # Set script filename
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Block access to hidden files
    # This includes .htaccess, .git, etc.
    location ~ /\. {
        # Deny all access
        deny all;
    }
}
