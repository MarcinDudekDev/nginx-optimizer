# WordPress Multisite with Subdirectory Configuration
# Source: WordPress Multisite documentation

map $uri $blogname {
    ~^(?P<blogpath>/[^/]+/)files/(.*) $blogpath;
}

map $blogname $blogid {
    default -999;
    #Ref: http://wordpress.org/extend/plugins/nginx-helper/
}

server {
    listen 443 ssl;
    server_name multisite.example.com;
    root /var/www/multisite.example.com/public_html;

    ssl_certificate /etc/letsencrypt/live/multisite.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/multisite.example.com/privkey.pem;

    index index.php;

    # Global restrictions
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt { allow all; log_not_found off; access_log off; }
    location ~ /\. { deny all; }

    # WordPress Multisite Subdirectory rules
    if (!-e $request_filename) {
        rewrite /wp-admin$ $scheme://$host$uri/ permanent;
        rewrite ^(/[^/]+)?(/wp-.*) $2 last;
        rewrite ^(/[^/]+)?(/.*\.php) $2 last;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ ^(/[^/]+/)?files/(.+) {
        try_files /wp-content/blogs.dir/$blogid/files/$2 /wp-includes/ms-files.php?file=$2;
        access_log off;
        log_not_found off;
        expires max;
    }

    # Rewrite multisite '.../wp-hierarchicalesources/plugins/ or '.../wp-hierarchicalesources/themes/'
    location ~ ^/[_0-9a-zA-Z-]+/(wp-(content|admin|includes).*) {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 24h;
        log_not_found off;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
