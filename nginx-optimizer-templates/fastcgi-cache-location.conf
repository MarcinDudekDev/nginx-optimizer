# FastCGI Cache - Location Context Directives
# Include this INSIDE the existing location ~ \.php$ block
# Requires $skip_cache variable from fastcgi-cache.conf (server context)

fastcgi_cache WORDPRESS;
fastcgi_cache_bypass $skip_cache;
fastcgi_no_cache $skip_cache;
add_header X-FastCGI-Cache $upstream_cache_status;
