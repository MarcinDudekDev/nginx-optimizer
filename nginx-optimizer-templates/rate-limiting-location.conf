# Rate Limiting - Location/Server Level
# IMPORTANT: Include static-assets-bypass.conf BEFORE this file!
# Order in nginx matters: static assets should match first, then these rules

# =============================================================================
# REQUIRED ORDER IN SERVER BLOCK:
#   1. include static-assets-bypass.conf;   <- CSS/JS/images exempt
#   2. include rate-limiting-location.conf; <- This file (PHP only)
#   3. include wordpress-ajax-exclusion.conf; <- AJAX permissive rules
# =============================================================================

# General rate limiting - ONLY for PHP/dynamic content
# This should NOT affect static assets if static-assets-bypass.conf is included first
location ~ \.php$ {
    limit_req zone=general burst=30 nodelay;
    limit_req_status 429;
    limit_conn addr 75;
    limit_conn_status 429;

    # Pass to PHP-FPM (uncomment and adjust as needed)
    # include fastcgi_params;
    # fastcgi_pass unix:/var/run/php/php-fpm.sock;
    # fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

# Login endpoints - stricter rate limiting
location ~ ^/(wp-login\.php|wp-admin/admin-post\.php) {
    limit_req zone=login burst=5 nodelay;
    limit_req_status 429;
    limit_conn addr 10;

    # Pass to PHP-FPM...
}
