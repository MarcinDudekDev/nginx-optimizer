# Static Assets - Bypass Rate Limiting
# Include in server block BEFORE the general rate limiting location
# These files don't need rate limiting - they're cached and not a security risk

# CSS, JS, Images, Fonts - NO rate limiting
location ~* \.(css|js|mjs|jsx|ts|tsx)$ {
    # No rate limiting for scripts/styles
    expires 7d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
}

location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg|bmp|tiff)$ {
    # No rate limiting for images
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
}

location ~* \.(woff|woff2|ttf|otf|eot)$ {
    # No rate limiting for fonts
    expires 365d;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin "*";
    access_log off;
}

location ~* \.(mp4|webm|ogg|mp3|wav|pdf|zip|gz|tar|rar)$ {
    # No rate limiting for media/downloads
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
}

# WordPress static assets paths - explicit bypass
location ~* ^/wp-content/.*\.(css|js|jpg|jpeg|png|gif|ico|webp|svg|woff|woff2|ttf)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location ~* ^/wp-includes/.*\.(css|js|jpg|jpeg|png|gif|ico|webp|svg|woff|woff2|ttf)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}
