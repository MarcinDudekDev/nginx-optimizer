# Upstream Keepalive Configuration
# This file goes in conf.d/ (http context)
#
# Enables persistent connections between nginx and PHP-FPM,
# eliminating connect/accept/close overhead on every request.
# On busy sites (50+ req/s), this saves ~5ms per request.

upstream php-fpm {
    server unix:/var/run/php-fpm.sock;
    keepalive 16;
}
