# Rate Limiting Configuration for nginx
# Add to http context (proxy.conf or nginx.conf)

# =============================================================================
# USAGE IN LOCATION BLOCKS:
#   limit_req zone=ZONE_NAME burst=N nodelay;
#
# Parameters:
#   burst  = Number of requests to allow above rate before returning 429
#            (creates burst capacity without slowing down valid traffic)
#   nodelay = Process burst requests immediately (don't queue them)
#            Without this, requests would be delayed to match rate limit
#
# Example:
#   limit_req zone=general burst=30 nodelay;
#   This allows 15 req/s sustained + 30 extra for bursts
# =============================================================================

# Rate Limiting Zones (loosened for AJAX compatibility)

# General requests: 15 requests/second per IP
# Recommended burst=30 (allows 2 seconds worth of requests in bursts)
limit_req_zone $binary_remote_addr zone=general:10m rate=15r/s;
# Usage: limit_req zone=general burst=30 nodelay;

# Login/auth endpoints: 8 requests/second per IP (stricter)
# Recommended burst=5 (minimal burst for login flows)
limit_req_zone $binary_remote_addr zone=login:10m rate=8r/s;
# Usage: limit_req zone=login burst=5 nodelay;

# API endpoints: 30 requests/second per IP (more permissive)
# Recommended burst=60 (allows 2 seconds worth of requests in bursts)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
# Usage: limit_req zone=api burst=60 nodelay;

# AJAX endpoints: 60 requests/second per IP (very permissive for imports)
# Recommended burst=120 (allows 2 seconds worth of requests in bursts)
limit_req_zone $binary_remote_addr zone=ajax:10m rate=60r/s;
# Usage: limit_req zone=ajax burst=120 nodelay;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;
