# Rate Limiting Configuration for nginx
# Add to http context (proxy.conf or nginx.conf)

# Rate Limiting Zones
# General requests: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Login/auth endpoints: 5 requests/second per IP (stricter)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

# API endpoints: 20 requests/second per IP (more permissive)
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;
