################################################################################
# Honeypot Tarpit Configuration
#
# Traps credential-scanning bots with:
# - Slow-drip responses (tarpit)
# - Fake credentials with canary tokens
# - Detailed logging for threat intel
# - Auto-ban integration ready (fail2ban)
#
# Generated by nginx-optimizer --enable honeypot
################################################################################

# Honeypot log format - captures everything useful
log_format honeypot_log '$time_iso8601 '
    'ip=$remote_addr '
    'method=$request_method '
    'path=$request_uri '
    'status=$status '
    'bytes=$bytes_sent '
    'ua="$http_user_agent" '
    'ref="$http_referer" '
    'duration=$request_time '
    'xff="$http_x_forwarded_for"';

# Rate limiting zone for honeypot (aggressive)
limit_req_zone $binary_remote_addr zone=honeypot_limit:1m rate=1r/m;

# Map to detect known vulnerability scanners
map $http_user_agent $is_scanner {
    default 0;
    ~*sqlmap           1;
    ~*nikto            1;
    ~*nessus           1;
    ~*openvas          1;
    ~*w3af             1;
    ~*acunetix         1;
    ~*netsparker       1;
    ~*burp             1;
    ~*dirbuster        1;
    ~*gobuster         1;
    ~*wfuzz            1;
    ~*nuclei           1;
}

################################################################################
# INCLUDE IN SERVER BLOCK - Honeypot Locations
################################################################################

# Main honeypot handler - serves tarpitted fake credentials
location @honeypot_tarpit {
    internal;

    # Log to dedicated honeypot log
    access_log /var/log/nginx/honeypot.log honeypot_log;

    # Aggressive rate limit
    limit_req zone=honeypot_limit burst=1 nodelay;

    # Tarpit settings - painfully slow (50 bytes/second)
    limit_rate 50;

    # Long timeout to keep connection open
    send_timeout 120s;

    # Serve the honeypot file
    root /var/www/honeypot;
    try_files $uri /fake-env.txt;

    # Headers to look legitimate
    add_header Content-Type "text/plain; charset=utf-8" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
}

# Catch-all for honeypot paths (sensitive files bots scan for)
location ~* ^/(\.env|\.git/config|\.git/HEAD|backup\.sql|dump\.sql|wp-config\.php\.(bak|old|save|txt)|\.aws/credentials|\.docker/config\.json|debug\.log|\.npmrc|\.netrc) {
    access_log /var/log/nginx/honeypot.log honeypot_log;
    limit_req zone=honeypot_limit burst=1 nodelay;
    limit_rate 50;  # 50 bytes/sec tarpit
    send_timeout 120s;

    root /var/www/honeypot;
    try_files /fake-env.txt =404;
    add_header Content-Type "text/plain; charset=utf-8" always;
}

# Database dump honeypot (larger file, extra slow tarpit)
location ~* \.(sql|sql\.gz|sql\.bak)$ {
    access_log /var/log/nginx/honeypot.log honeypot_log;
    limit_req zone=honeypot_limit burst=1 nodelay;
    limit_rate 25;  # Extra slow: 25 bytes/sec
    send_timeout 300s;

    root /var/www/honeypot;
    try_files /fake-database.sql =404;
    add_header Content-Type "application/sql" always;
}

# Git config honeypot
location ~* ^/\.git/(config|HEAD) {
    access_log /var/log/nginx/honeypot.log honeypot_log;
    limit_req zone=honeypot_limit burst=1 nodelay;
    limit_rate 50;
    send_timeout 120s;

    root /var/www/honeypot;
    try_files /fake-git-config.txt =404;
    add_header Content-Type "text/plain" always;
}

# Admin panel honeypot (phpmyadmin, adminer, etc)
location ~* ^/(phpmyadmin|pma|mysql|adminer|phpMyAdmin) {
    access_log /var/log/nginx/honeypot.log honeypot_log;
    limit_req zone=honeypot_limit burst=1 nodelay;
    limit_rate 100;  # Slow HTML
    send_timeout 120s;

    root /var/www/honeypot;
    try_files /fake-admin.html =404;
    add_header Content-Type "text/html; charset=utf-8" always;
}

# Canary token callback endpoint (triggered when fake creds are used)
location ~ ^/\.h0n3yp0t/([a-zA-Z0-9_-]+)$ {
    access_log /var/log/nginx/honeypot-canary.log honeypot_log;
    empty_gif;  # Return 1x1 transparent gif, logging is what matters
}

