# WordPress AJAX Rate Limiting Exclusion
# Include in server block to allow high-volume AJAX requests (imports, bulk operations)

# admin-ajax.php - very permissive for AJAX-heavy operations
location = /wp-admin/admin-ajax.php {
    limit_req zone=ajax burst=100 nodelay;
    limit_conn addr 100;

    # For FastCGI (uncomment and adjust socket path)
    # include fastcgi_params;
    # fastcgi_pass unix:/var/run/php/php-fpm.sock;
    # fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

    # For proxy pass (uncomment and adjust upstream)
    # proxy_pass http://your_upstream;
}

# WP REST API - also more permissive
location /wp-json/ {
    limit_req zone=api burst=50 nodelay;
    limit_conn addr 75;

    # pass to your backend...
}
