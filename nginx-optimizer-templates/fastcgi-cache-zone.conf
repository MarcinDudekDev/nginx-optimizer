# FastCGI Cache Zone Configuration
# This file goes in conf.d/ (http context)

# Cache path and zone
fastcgi_cache_path /var/run/nginx-cache levels=1:2 keys_zone=WORDPRESS:100m inactive=60m max_size=512m;
fastcgi_cache_key "$scheme$request_method$host$request_uri";
fastcgi_cache_use_stale error timeout invalid_header http_500 updating;
fastcgi_cache_background_update on;
fastcgi_ignore_headers Cache-Control Expires Set-Cookie;

# Default cache settings
fastcgi_cache_valid 200 60m;
fastcgi_cache_valid 404 10m;
