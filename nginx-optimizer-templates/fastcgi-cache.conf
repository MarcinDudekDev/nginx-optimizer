# FastCGI Cache Server Configuration
# This file goes in snippets/ and is included in server blocks

# Skip cache for logged-in users and certain requests
set $skip_cache 0;

# POST requests and URLs with query strings should skip cache
if ($request_method = POST) {
    set $skip_cache 1;
}
if ($query_string != "") {
    set $skip_cache 1;
}

# Don't cache URIs containing these segments
if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|^/feed/*|/tag/.*/feed/*|index.php|sitemap(_index)?.xml") {
    set $skip_cache 1;
}

# Don't cache if logged in or recent comments
if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
    set $skip_cache 1;
}

# Enable cache for PHP requests
location ~ \.php$ {
    fastcgi_cache WORDPRESS;
    fastcgi_cache_bypass $skip_cache;
    fastcgi_no_cache $skip_cache;
    add_header X-FastCGI-Cache $upstream_cache_status;
}
