# Compression Configuration
# This file goes in conf.d/ (http context)
# Includes both Brotli (if available) and Gzip fallback

# Brotli compression (requires ngx_brotli module)
# Uncomment if module is compiled in:
# brotli on;
# brotli_comp_level 6;
# brotli_static on;
# brotli_types application/atom+xml application/javascript application/json application/rss+xml
#              application/vnd.ms-fontobject application/x-font-opentype application/x-font-truetype
#              application/x-font-ttf application/x-javascript application/xhtml+xml application/xml
#              font/eot font/opentype font/otf font/truetype image/svg+xml image/vnd.microsoft.icon
#              image/x-icon image/x-win-bitmap text/css text/javascript text/plain text/xml;

# Gzip compression (always enabled as fallback)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/vnd.ms-fontobject
    application/wasm
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/bmp
    image/svg+xml
    text/cache-manifest
    text/calendar
    text/css
    text/javascript
    text/markdown
    text/plain
    text/xml
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

# Disable gzip for older IE
gzip_disable "MSIE [1-6]\.";
