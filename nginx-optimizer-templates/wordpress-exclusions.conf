# WordPress Security Exclusions
# Include this in server blocks for WordPress sites

# Block XML-RPC
location = /xmlrpc.php {
    deny all;
    return 444;
}

# Protect wp-config.php
location = /wp-config.php {
    deny all;
}

# Block access to WordPress includes
location ~* ^/wp-includes/.*\.php$ {
    deny all;
}

# Deny hidden files
location ~ /\. {
    deny all;
    return 404;
}
