# Security Headers Configuration
# Pure security headers - rate limiting moved to separate files

# HSTS - Force HTTPS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Clickjacking protection
add_header X-Frame-Options "SAMEORIGIN" always;

# MIME sniffing protection
add_header X-Content-Type-Options "nosniff" always;

# XSS protection (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy (camera, mic, etc)
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# CSP - Permissive for WordPress compatibility
# Allows: self, inline, eval, any https, data URIs, blob, CDNs
add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: http: data: blob: 'unsafe-hashes'; img-src 'self' https: http: data: blob:; font-src 'self' https: data:; connect-src 'self' https: wss:;" always;
