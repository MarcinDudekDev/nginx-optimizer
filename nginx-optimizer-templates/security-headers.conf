# Security Headers Configuration
# Include this in server blocks for security hardening
#
# IMPORTANT: nginx add_header inheritance quirk
# If a child location block has ANY add_header directive, it replaces ALL
# parent add_header directives. Re-include this file in any location block
# that uses its own add_header (e.g., static assets with Cache-Control).

# Prevent clickjacking attacks
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Enable XSS Protection
add_header X-XSS-Protection "1; mode=block" always;

# HTTP Strict Transport Security (HSTS)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
