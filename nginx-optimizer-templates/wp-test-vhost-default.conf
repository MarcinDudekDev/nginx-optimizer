# =============================================================================
# nginx-optimizer: Default vhost configuration for wp-test sites
# Generated by nginx-optimizer - easy to apply/remove as a single file
# =============================================================================

# -----------------------------------------------------------------------------
# SECURITY HEADERS
# -----------------------------------------------------------------------------
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# CSP - Permissive for WordPress compatibility
# Allows: self, inline, eval, https/http, data URIs, blob, websockets
add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: http: data: blob: 'unsafe-hashes'; img-src 'self' https: http: data: blob:; font-src 'self' https: data:; connect-src 'self' https: wss:;" always;

# -----------------------------------------------------------------------------
# CACHING & PERFORMANCE HEADERS
# -----------------------------------------------------------------------------
add_header X-Cache-Enabled "True" always;
add_header Cache-Control "public, max-age=3600" always;
add_header Alt-Svc 'h3=":443"; ma=86400' always;

# -----------------------------------------------------------------------------
# RATE LIMITING (using zones from proxy.conf)
# Applied ONLY to dynamic requests - static assets are NOT rate limited
# The proxy.conf defines: zone=general rate=1000r/s (very permissive)
# -----------------------------------------------------------------------------

# Rate limiting for dynamic content only (burst allows short spikes)
limit_req zone=general burst=50 nodelay;
limit_req_status 429;

# Connection limit per IP
limit_conn addr 100;
limit_conn_status 429;
