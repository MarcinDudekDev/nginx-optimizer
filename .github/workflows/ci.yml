# CI Pipeline for nginx-optimizer
# Runs on push/PR to main: shellcheck, syntax check, functional tests

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck (errors)
        run: shellcheck --severity=error nginx-optimizer.sh nginx-optimizer-lib/*.sh lib/registry.sh lib/core/*.sh lib/features/*.sh

      - name: Run shellcheck (warnings)
        run: shellcheck --severity=warning nginx-optimizer.sh nginx-optimizer-lib/*.sh lib/registry.sh lib/core/*.sh lib/features/*.sh

  syntax-check:
    name: Bash Syntax (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Show bash version
        run: bash --version | head -1

      - name: Check bash syntax - main script
        run: bash -n nginx-optimizer.sh

      - name: Check bash syntax - library files
        run: |
          for f in nginx-optimizer-lib/*.sh; do
            bash -n "$f" || exit 1
          done

      - name: Check bash syntax - plugin architecture
        run: |
          for f in lib/registry.sh lib/core/*.sh lib/features/*.sh; do
            bash -n "$f" || exit 1
          done

      - name: Check bash syntax - test scripts
        run: bash -n tests/run-tests.sh

  test:
    name: Test Suite (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: [shellcheck, syntax-check]
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install shellcheck

      - name: Run test suite
        run: ./tests/run-tests.sh

      - name: Test --version output
        run: |
          version=$(./nginx-optimizer.sh --version 2>&1)
          echo "Version: $version"
          echo "$version" | grep -q "0.10.0-beta" || exit 1

      - name: Test help command
        run: ./nginx-optimizer.sh help | grep -q "COMMANDS:"

      - name: Test dry-run mode
        run: ./nginx-optimizer.sh optimize --dry-run 2>&1 | grep -q "DRY RUN"

      - name: Test check command
        run: ./nginx-optimizer.sh check 2>&1 | grep -qiE "(check|ready|issue|Prerequisites)"

      - name: Test diff command
        run: ./nginx-optimizer.sh diff 2>&1 | grep -qiE "(diff|backup|No backups)"

      - name: Test verify command
        run: ./nginx-optimizer.sh verify 2>&1 | grep -qiE "(verify|Verification|No state|features)"

      - name: Test --no-color flag
        run: |
          output=$(./nginx-optimizer.sh --no-color --version 2>&1 | cat -v)
          if echo "$output" | grep -q '\[0;'; then echo "FAIL: escape codes found in --no-color output"; exit 1; fi

      - name: Docker nginx validation
        if: matrix.os == 'ubuntu-latest'
        run: ./tests/test-with-nginx.sh

  portability:
    name: Portability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for GNU-only commands
        run: |
          echo "Checking for find -printf..."
          ! grep -r "find.*-printf" nginx-optimizer-lib/

          echo "Checking for declare -A..."
          ! grep -r "declare -A" nginx-optimizer-lib/

          echo "Checking for flock..."
          ! grep -rw "flock" nginx-optimizer.sh nginx-optimizer-lib/*.sh | grep -v "#"

          echo "All portability checks passed!"
